spring.application.name=aaugp



spring.datasource.url=jdbc:postgresql:///ep-hidden-feather-ap5fhjvy-pooler.c-7.us-east-1.aws.neon.tech:5432/aaugp?sslmode=require

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
