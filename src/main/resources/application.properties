spring.application.name=aaugp

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-hidden-feather-ap5fhjvy-pooler.c-7.us-east-1.aws.neon.tech:5432/aaugp?sslmode=require}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

springdoc.swagger-ui.tagsSorter=alpha

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

server.port=${PORT:8080}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true

# # TanStack dev servers commonly use 3000, Vite uses 5173, and previews often use 4173.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173}
app.api.base-url=${API_BASE_URL:http://localhost:8080}
app.jwt.secret=${JWT_SECRET:change-this-secret-before-production}
app.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
app.jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}
app.jwt.refresh-token-cleanup-delay-ms=${JWT_REFRESH_TOKEN_CLEANUP_DELAY_MS:3600000}
